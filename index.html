<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text x='50' y='80' font-family='Arial, sans-serif' font-weight='bold' font-size='85' fill='%2325D366' text-anchor='middle'>X</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyBox Dashboard</title>
  </head>
  <body>
    <div id="root">
      <style>
        body, html {
          margin: 0;
          padding: 0;
          overflow: hidden; /* Prevent scrollbar during loading */
        }
        .app-loader-wrapper {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #F8FAFC;
          font-family: 'Inter', -apple-system, sans-serif;
        }
        .app-loader-logo {
          width: 80px;
          height: 80px;
          margin-bottom: 24px;
          animation: pulse 2s infinite ease-in-out;
          filter: drop-shadow(0px 8px 16px rgba(37, 211, 102, 0.25));
        }
        .app-loader-spinner {
          width: 36px;
          height: 36px;
          border: 3px solid #E5E7EB;
          border-top-color: #25D366;
          border-radius: 50%;
          animation: spin 1s infinite linear;
        }
        .app-loader-text {
          margin-top: 20px;
          color: #128C7E;
          font-weight: 600;
          font-size: 15px;
          letter-spacing: 0.5px;
        }
        @keyframes pulse {
          0%, 100% { transform: scale(1); }
          50% { transform: scale(1.08); }
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
      </style>
      <div class="app-loader-wrapper">
        <img src="/logo.png" alt="SkyBox Logo" class="app-loader-logo" />
        <div class="app-loader-spinner"></div>
        <div class="app-loader-text">Memuat SkyBox CRM...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
